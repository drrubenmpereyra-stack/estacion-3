        // MODIFICACIÓN CRÍTICA EN showFinalReport PARA GUARDAR DATOS
        async function showFinalReport() {
            document.getElementById('view-active-decisions').classList.add('hidden');
            document.getElementById('view-results').classList.remove('hidden');

            // 1. Guardar en Firebase
            try {
                await db.collection("progreso_estacion_3").add({
                    paciente: activePatient.name,
                    precision: userAccuracy,
                    tratamiento: userChoices.treatmentName,
                    fecha: new Date().toISOString()
                });
            } catch (e) { console.error("Error al guardar en Firebase:", e); }

            // 2. Lógica visual de resultados (tu código original)
            if (userAccuracy < 10) userAccuracy = 10;
            document.getElementById('result-precision').innerText = `${userAccuracy}%`;
            
            // ... (resto de tu lógica de renderizado original) ...

            const container = document.querySelector('.flex.flex-col.sm\\:flex-row.gap-4.justify-center.mt-6');

                <button onclick="window.location.href='https://drrubenmpereyra-stack.github.io/mapa-global-estaciones/'"
