<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación 3</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #simulador { border: 1px solid #d4af37; padding: 30px; width: 80%; max-width: 600px; text-align: center; }
        button { display: block; width: 100%; margin: 10px 0; padding: 15px; border: 1px solid #d4af37; background: transparent; color: #d4af37; cursor: pointer; }
        button:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

<div id="simulador">
    <h2 id="pregunta">Cargando...</h2>
    <div id="botones"></div>
</div>

<script>
    // Inicialización Firebase
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const data = {
        pregunta: "¿Qué dispositivo clínico es óptimo para Lucas B.?",
        opciones: ["Psicoterapia Clásica", "Rehabilitación Neurocognitiva", "Terapia de Exposición"],
        correcta: 1
    };

    function iniciar() {
        document.getElementById('pregunta').innerText = data.pregunta;
        const divBotones = document.getElementById('botones');
        data.opciones.forEach((op, i) => {
            const btn = document.createElement('button');
            btn.innerText = op;
            btn.onclick = () => finalizar(i === data.correcta);
            divBotones.appendChild(btn);
        });
    }

    async function finalizar(esCorrecto) {
        document.getElementById('simulador').innerHTML = `<h2>${esCorrecto ? '¡Correcto!' : 'Incorrecto'}</h2>`;
        
        await db.collection("progreso").add({
            estacion: 3,
            resultado: esCorrecto ? "Aprobado" : "Reprobado",
            fecha: new Date().toISOString()
        });

        setTimeout(() => {
            window.location.href = "https://drrubenmpereyra-stack.github.io/mapa-global-estaciones/";
        }, 2000);
    }

    window.onload = iniciar;
</script>

</body>
</html>
